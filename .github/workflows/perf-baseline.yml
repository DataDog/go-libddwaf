name: Performance Baseline

on:
  workflow_dispatch:
  push:
    branches:
      - 'bench/baseline-*'

env:
  GOMAXPROCS: 4

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks
        run: go test -run=^$ -bench=. -benchmem -count=10 -benchtime=1s -timeout=30m ./... > linux-amd64-baseline.txt

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-baseline
          path: linux-amd64-baseline.txt
